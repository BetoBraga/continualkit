name: Agent Dispatch

on:
  issues:
    types: [labeled]

# Only runs when agent-ready label is added
jobs:
  check-trigger:
    if: github.event.label.name == 'agent-ready'
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.checks.outputs.should-run }}
    permissions:
      issues: read
      pull-requests: read
    steps:
      - name: Check rate limits and PR cap
        id: checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          OPEN_AGENT_PRS=$(gh pr list --repo "$REPO" --label "agent-generated" --state open --json number | jq length)
          echo "Open agent PRs: $OPEN_AGENT_PRS"

          if [ "$OPEN_AGENT_PRS" -ge 3 ]; then
            echo "❌ Cap reached: $OPEN_AGENT_PRS agent PRs already open (max: 3)."
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✅ Checks passed. Proceeding with agent dispatch."
          echo "should-run=true" >> "$GITHUB_OUTPUT"

  generate-pr:
    needs: check-trigger
    if: needs.check-trigger.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        env:
          AGENT_LLM_PROVIDER: ${{ secrets.AGENT_LLM_PROVIDER }}
        run: |
          pip install -e ".[dev]"

          # Install the right LLM SDK based on provider
          PROVIDER="${AGENT_LLM_PROVIDER:-openrouter}"
          case "$PROVIDER" in
            openrouter|openai|groq|huggingface|ollama)
              pip install openai
              ;;
            anthropic)
              pip install anthropic
              ;;
            *)
              echo "❌ Unknown provider: $PROVIDER"
              exit 1
              ;;
          esac

      - name: Read issue content
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json body -q .body > /tmp/issue_body.txt
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json title -q .title)
          echo "title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"

      - name: Generate implementation via LLM
        env:
          AGENT_LLM_KEY: ${{ secrets.AGENT_LLM_KEY }}
          AGENT_LLM_PROVIDER: ${{ secrets.AGENT_LLM_PROVIDER }}
          AGENT_LLM_MODEL: ${{ secrets.AGENT_LLM_MODEL }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          SYSTEM_PROMPT='You are an implementation agent for ContinualKit, a Python continual learning toolkit for LLMs.

          Rules:
          - Only create or modify files in: src/continualkit/, tests/, docs/, examples/, README.md
          - NEVER touch: .github/workflows/, .github/CODEOWNERS, scripts/, pyproject.toml, LICENSE
          - Always write tests for every new function or class
          - Keep diff small (< 200 lines total across all files)
          - Use ruff-compatible Python: py310+, type hints, no unused imports
          - Use stdlib only unless the issue explicitly allows a dependency
          - One function or class per PR, no premature abstraction
          - Tests must be in the tests/ directory, mirroring the src/ structure

          Output ONLY valid JSON with this exact structure:
          {
            "files": [
              {"path": "src/continualkit/eval/__init__.py", "content": "...full file content..."},
              {"path": "tests/eval/test_metrics.py", "content": "...full file content..."}
            ],
            "pr_description": "markdown string describing what was implemented and why"
          }'

          USER_MSG="Issue #${ISSUE_NUMBER}:

          $(cat /tmp/issue_body.txt)"

          python scripts/llm_adapter.py \
            --system "$SYSTEM_PROMPT" \
            --user "$USER_MSG" \
            --temperature 0.2 \
            --out /tmp/llm_response.json

      - name: Write generated files
        run: |
          python - <<'PYEOF'
          import json, os

          with open("/tmp/llm_response.json") as f:
              result = json.load(f)

          for file_spec in result.get("files", []):
              path = file_spec["path"]
              content = file_spec["content"]
              dirpath = os.path.dirname(path)
              if dirpath:
                  os.makedirs(dirpath, exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)
              print(f"Written: {path}")

          pr_desc = result.get("pr_description", "Agent-generated implementation.")
          with open("/tmp/pr_description.txt", "w") as f:
              f.write(pr_desc)

          print("Files written successfully.")
          PYEOF

      - name: Run gates before creating PR
        run: |
          python -m ruff check . || (echo "❌ Lint failed — aborting PR creation." && exit 1)
          python -m ruff format .
          python -m pytest --tb=short -q || (echo "❌ Tests failed — aborting PR creation." && exit 1)
          python scripts/check_diff_size.py --max-lines 400
          python scripts/check_paths.py

      - name: Create branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          REPO: ${{ github.repository }}
          AGENT_LLM_PROVIDER: ${{ secrets.AGENT_LLM_PROVIDER }}
          AGENT_LLM_MODEL: ${{ secrets.AGENT_LLM_MODEL }}
        run: |
          PROVIDER="${AGENT_LLM_PROVIDER:-groq}"
          MODEL="${AGENT_LLM_MODEL:-default}"
          BRANCH="agent/issue-${ISSUE_NUMBER}-$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-40)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat: agent implementation for issue #${ISSUE_NUMBER} [${PROVIDER}/${MODEL}]"
          git push origin "$BRANCH"

          PR_BODY=$(cat /tmp/pr_description.txt)
          gh pr create \
            --repo "$REPO" \
            --title "feat: [agent] $(echo "$ISSUE_TITLE" | cut -c1-60)" \
            --body "## Related Issue
          Fixes #${ISSUE_NUMBER}

          ## What Changed
          ${PR_BODY}

          ## How I Tested
          Automated tests included. CI gates (ruff + pytest + diff size + path check) passed before this PR was created.

          ## Checklist
          - [x] Tests added or updated
          - [x] ruff check passes
          - [x] ruff format passes
          - [x] pytest passes 100%
          - [x] No forbidden paths touched
          - [x] Diff < 400 lines

          ---
          _Generated by agent pipeline — provider: \`${PROVIDER}\`, model: \`${MODEL}\`_
          <!-- agent-generated: true -->" \
            --label "agent-generated" \
            --head "$BRANCH" \
            --base main

      - name: Log to activity issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          RUN_STATUS: ${{ job.status }}
          AGENT_LLM_PROVIDER: ${{ secrets.AGENT_LLM_PROVIDER }}
          AGENT_LLM_MODEL: ${{ secrets.AGENT_LLM_MODEL }}
        run: |
          LOG_ISSUE=$(gh issue list --repo "$REPO" --label "agent-log" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$LOG_ISSUE" ]; then
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            PROVIDER="${AGENT_LLM_PROVIDER:-groq}"
            MODEL="${AGENT_LLM_MODEL:-default}"
            gh issue comment "$LOG_ISSUE" --repo "$REPO" \
              --body "**${TIMESTAMP}** | Issue #${ISSUE_NUMBER} | Status: **${RUN_STATUS}** | Provider: \`${PROVIDER}/${MODEL}\` | [Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi
