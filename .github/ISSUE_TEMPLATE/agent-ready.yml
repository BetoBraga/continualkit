name: Agent-Ready Task
description: Structured issue for automatic implementation by the agent pipeline.
labels: ["agent-ready"]
body:
  - type: markdown
    attributes:
      value: |
        **Attention:** issues with this label may be implemented automatically.
        All fields are required — the agent does not accept ambiguity.

        Rules:
        - Scope must be small (estimated diff < 200 lines)
        - Must include tests as part of the acceptance criteria
        - Must not touch `.github/workflows/`, `scripts/`, `pyproject.toml`, `LICENSE`

  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
      description: "What will this change solve? Format: 'If [action], then [measurable result].'"
      placeholder: "If we add X to eval/__init__.py, then continual eval will return Y."
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: Concrete task
      description: What exactly should the agent implement? Be specific — function names, module, behavior.
      placeholder: |
        1. Add function `compute_forgetting(before: dict, after: dict) -> float` to `src/continualkit/eval/__init__.py`
        2. Takes dicts with per-task scores before and after training
        3. Returns the normalized average drop between 0.0 and 1.0
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria (testable)
      description: The agent will write tests for these criteria. Be specific.
      placeholder: |
        - `compute_forgetting({"task_a": 0.9}, {"task_a": 0.8})` returns 0.1 (±0.001)
        - `compute_forgetting({"task_a": 0.9}, {"task_a": 0.9})` returns 0.0
        - Raises `ValueError` if keys don't match between before and after
        - Tests in `tests/eval/test_metrics.py`
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope (what NOT to touch)
      description: Define what is out of scope for this implementation.
      placeholder: |
        - Do not implement visualization yet
        - Do not modify the CLI for now
        - Do not add new dependencies
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Target module
      options:
        - src/continualkit/train/
        - src/continualkit/eval/
        - src/continualkit/replay/
        - src/continualkit/compare/
        - src/continualkit/cli.py
        - tests/
        - docs/
    validations:
      required: true
