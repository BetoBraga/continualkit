name: Bug Report
description: Something broke. Describe the expected and actual behavior.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before opening:** check if a similar issue already exists.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      description: Expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. pip install continualkit
        2. continual eval --config ...
        3. Error: ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, continualkit version, GPU/CPU.
      placeholder: |
        - Python: 3.11
        - OS: Ubuntu 22.04
        - continualkit: 0.1.0
        - Hardware: A100 / CPU only
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste the full error here.
      render: shell
