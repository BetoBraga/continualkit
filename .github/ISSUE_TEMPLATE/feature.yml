name: Feature Request
description: Proposal for a new feature or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Rule:** no success metric and regression test, no merge.
        If you can't fill in the fields below, the proposal isn't ready yet.

  - type: textarea
    id: problem
    attributes:
      label: What pain does this solve?
      description: Describe the current problem or limitation. "I need X to do Y" is better than "it would be nice to have X".
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would it work? Interface, CLI, API?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know the feature is "done"? Be specific and testable.
      placeholder: |
        - continual eval returns forgetting score < 5% on benchmark X
        - Report generated in < 30s for a 7B model
        - No regression on existing tests
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you already tried? Why didn't it work?

  - type: dropdown
    id: scope
    attributes:
      label: Affected module
      multiple: true
      options:
        - train
        - eval
        - replay
        - compare
        - cli
        - docs
        - other
